<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>灵感搜集器 · 完整 App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #ece9e2; font-family: "PingFang SC", system-ui, sans-serif; }
  #root { width: 100%; height: 100%; }
  .stage { width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 28px 0; box-sizing: border-box; }
  .phone-wrap { width: 360px; height: 760px; border-radius: 44px; background: #FEFDF8; overflow: hidden;
    box-shadow: 0 34px 80px rgba(120,90,30,0.2), 0 0 0 1px rgba(120,90,30,0.06); position: relative; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- 本地密钥配置（可选，被 .gitignore 忽略）。不存在时静默回退到 localStorage 弹窗。 -->
<script src="config.local.js" onerror="this.remove()"></script>
</head>
<body>
<div id="root"></div>

<!-- ============================================================ -->
<!-- 组件按依赖顺序加载（Babel 在浏览器内编译 JSX）。               -->
<!-- 需通过本地 HTTP 服务打开（如 `python3 -m http.server`），     -->
<!-- 直接双击 file:// 打开会因 CORS 无法加载下列 src 文件。        -->
<!-- ============================================================ -->

<!-- 基础设施层 -->
<script type="text/babel" src="components/glow-core.jsx"></script>   <!-- 设计系统：配色/图标/光晕/外壳 -->
<script type="text/babel" src="components/store.js"></script>        <!-- 全局状态 + localStorage -->
<script type="text/babel" src="components/agent.js"></script>        <!-- 智谱 BigModel agent 引擎 -->
<script type="text/babel" src="components/key-modal.jsx"></script>   <!-- API Key 弹窗 -->

<!-- 页面层 -->
<script type="text/babel" src="components/jar-flow2.jsx"></script>   <!-- 首页：灵感罐 + 摇一摇合成 -->
<script type="text/babel" src="components/app-shell.jsx"></script>   <!-- 手机外壳 + 底部 Tab -->
<script type="text/babel" src="components/app-agent.jsx"></script>   <!-- 对话页 -->
<script type="text/babel" src="components/app-community.jsx"></script><!-- 社区页 -->
<script type="text/babel" src="components/app-me.jsx"></script>      <!-- 我的页 -->

<!-- 应用入口 -->
<script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
