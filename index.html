<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>灵感骰子 Idea Dice</title>
<style>
  :root {
    --bg: #E8E4DE;
    --app-bg: #faf6f1;
    --surface: #ffffff;
    --surface-soft: #fbf3ea;
    --border: #ebe1d2;
    --text: #2b2620;
    --text-soft: #807468;
    --accent: #d97757;
    --accent-soft: #f2d8c8;
    --purple: #8b7ab8;
    --purple-soft: #e6dff0;
    --shadow: 0 4px 16px rgba(120, 90, 60, 0.08);

    --phone-w: 390px;
    --phone-h: 844px;
    --status-h: 44px;
    --tabbar-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #f5f1ea 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, #e8dfd2 0%, transparent 50%),
      var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    display: grid;
    place-items: center;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ul, ol { list-style: none; }

  /* ===================== Phone frame ===================== */
  .phone-frame {
    position: relative;
    width: var(--phone-w);
    height: var(--phone-h);
    border-radius: 44px;
    border: 8px solid #1a1a1a;
    background: var(--app-bg);
    box-shadow:
      0 30px 60px rgba(0, 0, 0, 0.25),
      0 0 0 1px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    isolation: isolate;
  }

  /* Status bar (simulated) */
  .phone-status {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--status-h);
    background: var(--app-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px 0 32px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    z-index: 10;
  }
  .phone-status::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #1a1a1a;
    border-radius: 18px;
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 13px;
  }
  .status-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
  }
  .status-bars span {
    width: 3px;
    background: var(--text);
    border-radius: 1px;
  }
  .status-bars span:nth-child(1) { height: 4px; }
  .status-bars span:nth-child(2) { height: 6px; }
  .status-bars span:nth-child(3) { height: 8px; }
  .status-bars span:nth-child(4) { height: 10px; }
  .battery {
    width: 24px;
    height: 12px;
    border: 1.2px solid var(--text);
    border-radius: 3px;
    position: relative;
    margin-left: 4px;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 3px;
    width: 2px;
    height: 4px;
    background: var(--text);
    border-radius: 0 1px 1px 0;
  }
  .battery::before {
    content: '';
    position: absolute;
    inset: 1.5px;
    background: var(--text);
    border-radius: 1px;
    width: 70%;
  }

  /* App content area */
  .app-content {
    position: absolute;
    top: var(--status-h);
    bottom: var(--tabbar-h);
    left: 0; right: 0;
    overflow: hidden;
    background: var(--app-bg);
  }

  /* Tab panes */
  .tab-pane {
    display: none;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }
  .tab-pane.active { display: flex; }

  .tab-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--app-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 52px;
  }
  .tab-header-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 16px;
  }
  .tab-header-sub {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 400;
  }
  .tab-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px;
  }
  .panel-count {
    background: var(--surface-soft);
    color: var(--text-soft);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .icon-btn {
    padding: 6px 10px;
    border-radius: 8px;
    color: var(--text-soft);
    font-size: 12px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--surface-soft); color: var(--text); }
  .brand-dot {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 15px;
    transform: rotate(-8deg);
  }

  /* ===================== Bottom Tabs ===================== */
  .bottom-tabs {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--tabbar-h);
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 20;
  }
  .bottom-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 6px 0 8px;
    color: var(--text-soft);
    transition: color 0.15s;
  }
  .bottom-tab-icon {
    font-size: 22px;
    filter: grayscale(0.6);
    transition: filter 0.15s, transform 0.15s;
  }
  .bottom-tab-label {
    font-size: 10px;
    font-weight: 500;
  }
  .bottom-tab.active { color: var(--accent); }
  .bottom-tab.active .bottom-tab-icon {
    filter: grayscale(0);
    transform: scale(1.05);
  }

  /* ===================== Chat pane ===================== */
  .tab-pane[data-tab="chat"] { position: relative; }
  .chat-stream {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-size: 13px;
  }
  .msg-user .msg-avatar { background: var(--purple-soft); color: var(--purple); }
  .msg-agent .msg-avatar { background: var(--accent-soft); color: var(--accent); }
  .msg-body { flex: 1; min-width: 0; }
  .msg-author { font-size: 11px; color: var(--text-soft); margin-bottom: 3px; }
  .msg-content {
    background: var(--surface-soft);
    padding: 9px 12px;
    border-radius: 12px;
    border-top-left-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13.5px;
  }
  .msg-user .msg-content {
    background: var(--purple-soft);
    border-top-left-radius: 12px;
    border-top-right-radius: 4px;
  }
  .msg-user { flex-direction: row-reverse; }
  .msg-user .msg-body { text-align: right; }

  /* Tool call chip */
  .msg-tool .msg-content {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-soft);
    font-size: 11.5px;
    padding: 5px 11px;
    display: inline-block;
    border-radius: 999px;
  }
  .msg-tool .msg-content .tool-name {
    color: var(--accent);
    font-weight: 600;
  }

  /* Image message */
  .msg-image-wrap {
    background: var(--purple-soft);
    padding: 6px;
    border-radius: 12px;
    border-top-right-radius: 4px;
    display: inline-block;
    max-width: 220px;
  }
  .msg-image-wrap img {
    max-width: 100%;
    max-height: 220px;
    border-radius: 8px;
    display: block;
  }
  .msg-image-wrap .img-cap {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 4px;
    text-align: right;
    padding: 0 4px 2px;
  }

  /* Idea card */
  .idea-card {
    background: linear-gradient(135deg, #fff7ee 0%, #fef2e4 100%);
    border: 1px solid var(--accent-soft);
    border-radius: 14px;
    padding: 14px;
    margin-top: 4px;
    box-shadow: var(--shadow);
  }
  .idea-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .idea-tag {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .idea-title {
    font-size: 15.5px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
    line-height: 1.4;
  }
  .idea-section { margin-top: 10px; }
  .idea-section-label {
    font-size: 10px;
    color: var(--text-soft);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
    text-transform: uppercase;
  }
  .idea-section-body {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.6;
  }
  .idea-from { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .idea-chip {
    background: #fff;
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-soft);
  }
  .idea-chip.constraint {
    border-color: var(--purple-soft);
    color: var(--purple);
    background: var(--purple-soft);
  }
  .idea-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--accent-soft);
  }
  .idea-actions button {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 11.5px;
    background: #fff;
    border: 1px solid var(--border);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .idea-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .idea-actions .primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Extract card */
  .extract-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-top: 4px;
  }
  .extract-title {
    font-weight: 600;
    font-size: 12.5px;
    margin-bottom: 8px;
  }
  .extract-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
    max-height: 260px;
    overflow-y: auto;
  }
  .extract-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 9px;
    background: var(--surface-soft);
    border-radius: 8px;
    font-size: 12.5px;
    cursor: pointer;
  }
  .extract-row:hover { background: var(--accent-soft); }
  .extract-row input[type=checkbox] {
    margin-top: 3px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .extract-row span { flex: 1; word-break: break-word; }
  .extract-actions {
    display: flex;
    justify-content: flex-end;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .extract-actions button {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .extract-actions button:disabled {
    background: var(--border);
    color: var(--text-soft);
    cursor: not-allowed;
  }

  /* Drop overlay */
  .drop-overlay {
    position: absolute;
    inset: 60px 8px 100px;
    background: rgba(217, 119, 87, 0.12);
    border: 2px dashed var(--accent);
    border-radius: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
    pointer-events: none;
    z-index: 15;
    backdrop-filter: blur(2px);
  }
  .tab-pane[data-tab="chat"].dragging .drop-overlay { display: flex; }
  .drop-overlay .drop-icon { font-size: 32px; }

  /* ===================== Input bar ===================== */
  .input-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 8px 12px 10px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .media-tools {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .media-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface-soft);
    color: var(--text-soft);
    font-size: 16px;
    display: grid;
    place-items: center;
    border: 1px solid transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .media-btn:hover, .media-btn:active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .media-btn.recording {
    background: #e85a5a;
    color: #fff;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }

  .input-row {
    display: flex;
    gap: 6px;
    align-items: stretch;
  }
  .input-box {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    background: var(--surface-soft);
    display: flex;
    align-items: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .input-box:focus-within { border-color: var(--accent); background: #fff; }
  .input-box textarea {
    flex: 1;
    border: none;
    background: transparent;
    resize: none;
    font-size: 14px;
    line-height: 1.4;
    max-height: 100px;
    outline: none;
    padding: 0;
  }
  .send-btn {
    background: var(--text);
    color: #fff;
    padding: 0 14px;
    border-radius: 10px;
    font-size: 13px;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .dice-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #e88a6c 100%);
    color: #fff;
    padding: 0 14px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 3px 8px rgba(217, 119, 87, 0.35);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .dice-btn:hover { transform: translateY(-1px); }
  .dice-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .dice-icon { display: inline-block; }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }
  .dice-btn.rolling .dice-icon { animation: shake 0.4s ease-in-out infinite; }

  /* ===================== Fragment library tab ===================== */
  .fragment-add {
    padding: 10px 14px;
    background: var(--app-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .fragment-add input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    background: var(--surface-soft);
  }
  .fragment-add input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .fragment-add button {
    background: var(--accent);
    color: #fff;
    padding: 0 14px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
  }
  .fragment-list { display: flex; flex-direction: column; gap: 8px; }
  .fragment-item {
    padding: 11px 12px;
    background: var(--surface);
    border-radius: 10px;
    font-size: 13px;
    position: relative;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .fragment-item.picked { background: var(--accent-soft); border-color: var(--accent); }
  .fragment-text { color: var(--text); padding-right: 20px; word-break: break-word; }
  .fragment-meta { font-size: 11px; color: var(--text-soft); margin-top: 4px; }
  .fragment-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 20px; height: 20px;
    border-radius: 4px;
    color: var(--text-soft);
    font-size: 16px;
    line-height: 1;
  }
  .fragment-delete:hover { background: var(--surface-soft); color: var(--accent); }

  /* ===================== Pocket tab ===================== */
  .pocket-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .pocket-item:hover { border-color: var(--accent); }
  .pocket-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text);
    line-height: 1.4;
  }
  .pocket-desc {
    font-size: 12px;
    color: var(--text-soft);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .pocket-meta {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
  }
  .pocket-del { color: var(--text-soft); font-size: 12px; }
  .pocket-del:hover { color: var(--accent); }

  /* ===================== Me tab ===================== */
  .me-section {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .me-section-title {
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text-soft);
    background: var(--surface-soft);
    letter-spacing: 0.5px;
  }
  .me-item {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 12px;
    border-top: 1px solid var(--border);
    width: 100%;
    text-align: left;
    background: #fff;
  }
  .me-section .me-item:first-of-type { border-top: none; }
  .me-item-icon { font-size: 18px; width: 24px; text-align: center; }
  .me-item-text { flex: 1; min-width: 0; }
  .me-item-label { font-size: 14px; color: var(--text); }
  .me-item-sub {
    font-size: 11.5px;
    color: var(--text-soft);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .me-item-arrow { color: var(--text-soft); font-size: 18px; }
  .me-item-arrow.danger { color: #e85a5a; }
  .me-about {
    text-align: center;
    font-size: 11px;
    color: var(--text-soft);
    padding: 16px;
    line-height: 1.7;
  }

  /* ===================== Empty state ===================== */
  .empty {
    color: var(--text-soft);
    font-size: 13px;
    text-align: center;
    padding: 40px 16px;
    line-height: 1.7;
  }
  .empty .big { font-size: 28px; margin-bottom: 8px; display: block; }

  /* ===================== Modal (absolute inside phone) ===================== */
  .modal-bg {
    position: absolute;
    inset: 0;
    background: rgba(40, 30, 20, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
  }
  .modal-wide { max-width: 340px; }
  .modal h3 { margin-bottom: 6px; font-size: 15px; }
  .modal p { font-size: 12.5px; color: var(--text-soft); margin-bottom: 12px; line-height: 1.6; }
  .modal input[type=password], .modal input[type=text] {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--surface-soft);
  }
  .modal input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .modal-actions button {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface-soft); color: var(--text); }
  .modal a { color: var(--accent); text-decoration: none; }
  .modal-wide textarea {
    width: 100%;
    min-height: 160px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    background: var(--surface-soft);
    resize: vertical;
    font-family: inherit;
    line-height: 1.55;
  }
  .modal-wide textarea:focus { outline: none; border-color: var(--accent); background: #fff; }

  /* ===================== Toast (absolute) ===================== */
  .toast {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 12.5px;
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    max-width: 80%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Typing indicator */
  .typing { display: inline-flex; gap: 3px; padding: 3px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--text-soft);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #d4c5ad; }

  /* ===================== Real mobile (drop the frame) ===================== */
  @media (max-width: 500px) {
    body {
      background: var(--app-bg);
      display: block;
    }
    .phone-frame {
      width: 100%;
      height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
      max-width: 100vw;
    }
    .phone-status::before { display: none; }
    .phone-status { padding: 0 16px; }
  }
</style>
</head>

<script>
// ============================================================
// 灵感骰子 Idea Dice - MVP (Agent + Tool Use, 智谱 BigModel)
// 手机外框版 v0.5
// ============================================================

const API_BASE = 'https://open.bigmodel.cn/api/paas/v4';
const MODEL = 'glm-4.5'; // 也可换成 glm-4.6 / glm-4-plus / glm-4-air
const MAX_AGENT_ITERATIONS = 5;

const CONSTRAINTS = {
  '🎯 目标人群': ['独居青年', '通勤族', '新手父母', '远程工作者', '大学生', '数字游民',
    '宠物主人', '小店店主', '城市漫步者', '自由职业者', '退休长辈'],
  '🎭 情绪': ['治愈', '兴奋', '专注', '平静', '勇气', '温暖', '好奇', '解压', '浪漫', '荒诞', '怀旧'],
  '🧩 形式': ['小游戏', '日记本', '社区', '周报', '播客', '实体产品', '浏览器插件',
    '微信小程序', '线上工作坊', '卡牌组', 'newsletter'],
  '🌙 场景': ['通勤路上', '睡前', '等外卖时', '周末下午', '雨天', '深夜', '聚会',
    '排队中', '失眠夜', '散步时', '咖啡馆里'],
  '⚙️ 技术': ['语音交互', 'AR增强', 'AI生成', '区块链存证', '物联网', '纯手工',
    'Vibe Coding', '地图定位', '摄像头识别', '蓝牙连接', '本地优先']
};

// ---------- State ----------
const state = {
  apiKey: localStorage.getItem('idea-dice:apiKey') || '',
  fragments: JSON.parse(localStorage.getItem('idea-dice:fragments') || '[]'),
  pocket: JSON.parse(localStorage.getItem('idea-dice:pocket') || '[]'),
  chat: JSON.parse(localStorage.getItem('idea-dice:chat') || '[]'),
  activeTab: 'chat',
  pickedFragmentIds: [],
  rolling: false
};

function persist() {
  localStorage.setItem('idea-dice:apiKey', state.apiKey);
  localStorage.setItem('idea-dice:fragments', JSON.stringify(state.fragments));
  localStorage.setItem('idea-dice:pocket', JSON.stringify(state.pocket));
  localStorage.setItem('idea-dice:chat', JSON.stringify(state.chat.slice(-50)));
}

// ---------- DOM helpers ----------
const $ = (id) => document.getElementById(id);
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'onClick') e.onclick = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'text') e.textContent = v;
    else e.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach((c) => {
    if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

// ---------- Tab switching ----------
function switchTab(name) {
  state.activeTab = name;
  document.querySelectorAll('.tab-pane').forEach((p) => {
    p.classList.toggle('active', p.dataset.tab === name);
  });
  document.querySelectorAll('.bottom-tab').forEach((b) => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  if (name === 'me') refreshMeTab();
}

// ---------- Fragment library ----------
function renderFragments() {
  const list = $('fragment-list');
  list.innerHTML = '';
  $('fragment-count').textContent = state.fragments.length;
  if (state.fragments.length === 0) {
    list.appendChild(el('div', { className: 'empty', html:
      '<span class="big">🪶</span>先攒点碎片吧<br/>一句话、一个观察都行' }));
    return;
  }
  const wrap = el('div', { className: 'fragment-list' });
  state.fragments.slice().reverse().forEach((f) => {
    const isPicked = state.pickedFragmentIds.includes(f.id);
    const item = el('div', { className: 'fragment-item' + (isPicked ? ' picked' : '') });
    item.appendChild(el('div', { className: 'fragment-text', text: f.text }));
    const mark = sourceMarker(f.source);
    item.appendChild(el('div', { className: 'fragment-meta', text:
      formatTime(f.created) + (mark ? ' · ' + mark : '') }));
    const del = el('button', { className: 'fragment-delete', text: '×' });
    del.onclick = () => deleteFragment(f.id);
    item.appendChild(del);
    wrap.appendChild(item);
  });
  list.appendChild(wrap);
}

function addFragment(text, source = '') {
  text = (text || '').trim();
  if (!text) return null;
  const f = { id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    text, source, created: Date.now() };
  state.fragments.push(f);
  persist();
  renderFragments();
  return f;
}

function deleteFragment(id) {
  state.fragments = state.fragments.filter((f) => f.id !== id);
  persist();
  renderFragments();
}

// Source markers: typed text=none, voice=🎙️, image=🖼️, AI extract=🤖, line import=📋, web=🌐
const SOURCE_MARKERS = ['🎙️', '🖼️', '🤖', '📋', '🌐'];
function sourceMarker(source) {
  return SOURCE_MARKERS.includes(source) ? source : '';
}

// Single-shot source override for the next add_fragment (used by voice)
let pendingFragmentSource = '';
function consumePendingSource() {
  const s = pendingFragmentSource;
  pendingFragmentSource = '';
  return s;
}

// ---------- Chat ----------
function renderChat() {
  const stream = $('chat-stream');
  stream.innerHTML = '';
  if (state.chat.length === 0) {
    stream.appendChild(el('div', { className: 'empty', html:
      '<span class="big">🎲</span>欢迎来灵感骰子<br/>'
      + '左边加碎片，攒到 2 条就能摇骰子碰撞 idea 了'
    }));
    return;
  }
  state.chat.forEach((m) => stream.appendChild(renderMessage(m)));
  stream.scrollTop = stream.scrollHeight;
}

function renderMessage(m) {
  const isTool = m.kind === 'tool_call';
  const wrap = el('div', { className: 'msg msg-' + m.role + (isTool ? ' msg-tool' : '') });
  wrap.appendChild(el('div', { className: 'msg-avatar', text: m.role === 'user' ? '我' : '🎲' }));
  const body = el('div', { className: 'msg-body' });
  if (!isTool) {
    body.appendChild(el('div', { className: 'msg-author', text: m.role === 'user' ? '我' : '灵感骰子' }));
  }
  if (m.kind === 'idea') {
    body.appendChild(renderIdeaCard(m.idea, m));
  } else if (m.kind === 'extract') {
    body.appendChild(renderExtractCard(m));
  } else if (m.kind === 'image') {
    const wrap2 = el('div', { className: 'msg-image-wrap' });
    const img = el('img');
    img.src = m.imageUrl;
    wrap2.appendChild(img);
    if (m.text) wrap2.appendChild(el('div', { className: 'img-cap', text: m.text }));
    body.appendChild(wrap2);
  } else if (m.kind === 'typing') {
    const c = el('div', { className: 'msg-content' });
    c.appendChild(el('div', { className: 'typing',
      html: '<span></span><span></span><span></span>' }));
    body.appendChild(c);
  } else if (m.kind === 'tool_call') {
    const c = el('div', { className: 'msg-content' });
    c.appendChild(el('span', { html: toolCallLabel(m.tool, m.input) }));
    body.appendChild(c);
  } else {
    body.appendChild(el('div', { className: 'msg-content', text: m.text }));
  }
  wrap.appendChild(body);
  return wrap;
}

function toolCallLabel(name, input) {
  const escape = (s) => String(s || '').replace(/[<>&"]/g, (c) =>
    ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));
  switch (name) {
    case 'add_fragment':
      return '🪶 <span class="tool-name">收录碎片</span>：「' + escape((input.text || '').slice(0, 30)) + '」';
    case 'roll_dice':
      return '🎲 <span class="tool-name">摇骰子</span>…';
    case 'analyze_fragments':
      return '🔍 <span class="tool-name">分析碎片库</span>…';
    case 'search_cases':
      return '🌐 <span class="tool-name">搜索案例</span>：' + escape(input.query || '');
    case 'present_idea':
      return '✨ <span class="tool-name">生成 idea</span>';
    default:
      return '🔧 <span class="tool-name">' + escape(name) + '</span>';
  }
}

function renderIdeaCard(idea, msg) {
  const card = el('div', { className: 'idea-card' });
  const header = el('div', { className: 'idea-card-header' });
  header.appendChild(el('span', { className: 'idea-tag', text: '🎲 摇出来了' }));
  card.appendChild(header);
  card.appendChild(el('div', { className: 'idea-title', text: idea.title || '(无标题)' }));

  if (idea.description) {
    const sec = el('div', { className: 'idea-section' });
    sec.appendChild(el('div', { className: 'idea-section-label', text: '是什么' }));
    sec.appendChild(el('div', { className: 'idea-section-body', text: idea.description }));
    card.appendChild(sec);
  }
  if (idea.connection) {
    const sec = el('div', { className: 'idea-section' });
    sec.appendChild(el('div', { className: 'idea-section-label', text: '意外的关联' }));
    sec.appendChild(el('div', { className: 'idea-section-body', text: idea.connection }));
    card.appendChild(sec);
  }
  if (idea.mvp) {
    const sec = el('div', { className: 'idea-section' });
    sec.appendChild(el('div', { className: 'idea-section-label', text: '今天就能动手的 MVP' }));
    sec.appendChild(el('div', { className: 'idea-section-body', text: idea.mvp }));
    card.appendChild(sec);
  }
  if (msg && (msg.fromFragments || msg.constraint)) {
    const sec = el('div', { className: 'idea-section' });
    sec.appendChild(el('div', { className: 'idea-section-label', text: '骰子摇到了' }));
    const chips = el('div', { className: 'idea-from' });
    (msg.fromFragments || []).forEach((t) => {
      chips.appendChild(el('span', { className: 'idea-chip', text: t }));
    });
    if (msg.constraint) {
      chips.appendChild(el('span', { className: 'idea-chip constraint',
        text: msg.constraint.dim + ' · ' + msg.constraint.val }));
    }
    sec.appendChild(chips);
    card.appendChild(sec);
  }

  const actions = el('div', { className: 'idea-actions' });
  const saved = state.pocket.some((p) => p.ideaId === msg.id);
  const saveBtn = el('button', { className: saved ? '' : 'primary',
    text: saved ? '已收藏' : '⭐ 收藏' });
  saveBtn.onclick = () => {
    if (saved) return;
    saveIdea(msg);
    renderChat();
  };
  actions.appendChild(saveBtn);
  const searchBtn = el('button', { text: '🌐 找案例' });
  searchBtn.onclick = () => runAgent('帮我查一下「' + (idea.title || '这个 idea') + '」有没有类似的案例');
  actions.appendChild(searchBtn);
  const reRoll = el('button', { text: '🎲 再摇' });
  reRoll.onclick = () => rollDice();
  actions.appendChild(reRoll);
  card.appendChild(actions);
  return card;
}

function renderExtractCard(m) {
  const card = el('div', { className: 'extract-card' });
  card.appendChild(el('div', { className: 'extract-title',
    text: (m.source ? m.source + ' ' : '') + (m.title || '提取了 ' + (m.fragments || []).length + ' 条碎片') }));
  const list = el('div', { className: 'extract-list' });
  const checked = new Set((m.fragments || []).map((_, i) => i));
  (m.fragments || []).forEach((text, i) => {
    const row = el('label', { className: 'extract-row' });
    const cb = el('input', { type: 'checkbox' });
    cb.checked = true;
    cb.onchange = () => { if (cb.checked) checked.add(i); else checked.delete(i); };
    row.appendChild(cb);
    row.appendChild(el('span', { text }));
    list.appendChild(row);
  });
  card.appendChild(list);
  const actions = el('div', { className: 'extract-actions' });
  const confirmBtn = el('button', { text: '加入碎片库' });
  confirmBtn.onclick = () => {
    let added = 0;
    [...checked].sort((a, b) => a - b).forEach((i) => {
      if (addFragment(m.fragments[i], m.source || '')) added++;
    });
    confirmBtn.disabled = true;
    confirmBtn.textContent = added > 0 ? `已加入 ${added} 条 ✨` : '没选任何条';
    if (added > 0) {
      pushMessage({ role: 'agent', kind: 'text',
        text: `已收入 ${added} 条碎片到碎片库 ${m.source || ''}` });
    }
  };
  actions.appendChild(confirmBtn);
  card.appendChild(actions);
  return card;
}

function pushMessage(m) {
  m.id = m.id || (Date.now() + '-' + Math.random().toString(36).slice(2, 6));
  state.chat.push(m);
  persist();
  renderChat();
  return m;
}

function setTypingMessage(on) {
  state.chat = state.chat.filter((m) => m.kind !== 'typing');
  if (on) state.chat.push({ id: 'typing', role: 'agent', kind: 'typing' });
  renderChat();
}

// ---------- Pocket ----------
function renderPocket() {
  const list = $('pocket-list');
  list.innerHTML = '';
  $('pocket-count').textContent = state.pocket.length;
  if (state.pocket.length === 0) {
    list.appendChild(el('div', { className: 'empty', html:
      '<span class="big">🪄</span>收藏的 idea<br/>会出现在这里' }));
    return;
  }
  state.pocket.slice().reverse().forEach((p) => {
    const item = el('div', { className: 'pocket-item' });
    item.appendChild(el('div', { className: 'pocket-title', text: p.idea.title }));
    item.appendChild(el('div', { className: 'pocket-desc', text: p.idea.description || '' }));
    const meta = el('div', { className: 'pocket-meta' });
    meta.appendChild(el('span', { text: formatTime(p.created) }));
    const del = el('button', { className: 'pocket-del', text: '删除' });
    del.onclick = (e) => { e.stopPropagation(); deletePocket(p.id); };
    meta.appendChild(del);
    item.appendChild(meta);
    item.onclick = () => alert(formatIdeaForCopy(p.idea));
    list.appendChild(item);
  });
}

function saveIdea(msg) {
  state.pocket.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
    ideaId: msg.id,
    idea: msg.idea,
    fromFragments: msg.fromFragments || [],

  });
  persist();
  renderPocket();
}

function deletePocket(id) {
  state.pocket = state.pocket.filter((p) => p.id !== id);

}

function formatIdeaForCopy(idea) {
  return `${idea.title}\n\n${idea.description || ''}\n\n意外的关联：\n${idea.connection || ''}\n\nMVP：\n${idea.mvp || ''}`;
}

// ---------- Time format ----------
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toTimeString().slice(0, 5);
  return (d.getMonth() + 1) + '/' + d.getDate();
}

let lastDicePick = null;

function pickRandom(arr, n) {
  const a = arr.slice();
  const r = [];
  while (r.length < n && a.length) {
    r.push(a.splice(Math.floor(Math.random() * a.length), 1)[0]);
  }
  return r;
}

async function executeTool(name, input) {
  switch (name) {
    case 'add_fragment': {
      const f = addFragment(input.text || '', consumePendingSource());
      if (!f) return '失败：文本为空，没有入库。';
      const tip = state.fragments.length >= 3
        ? ' 现在碎片够摇骰子了——可以邀请用户摇一次。'
        : '';
      return `已存入碎片库：「${f.text}」。当前碎片库共 ${state.fragments.length} 条。` + tip;
    }
    case 'roll_dice': {
      if (state.fragments.length < 2) {
        return '失败：碎片库少于 2 条。请提示用户先攒至少 2 条。';
      }
      const n = Math.min(state.fragments.length, Math.random() < 0.5 ? 2 : 3);
      const picked = pickRandom(state.fragments, n);
      const dims = Object.keys(CONSTRAINTS);
      const dim = dims[Math.floor(Math.random() * dims.length)];
      const val = CONSTRAINTS[dim][Math.floor(Math.random() * CONSTRAINTS[dim].length)];
      lastDicePick = { picked, constraint: { dim, val } };
      state.pickedFragmentIds = picked.map((f) => f.id);
      renderFragments();
      setTimeout(() => { state.pickedFragmentIds = []; renderFragments(); }, 8000);
      return `骰子结果：
碎片：
${picked.map((f, i) => `${i + 1}. 「${f.text}」`).join('\n')}
约束维度：${dim} = ${val}

请把这几个碎片碰撞成一个 idea，然后立刻调用 present_idea。要点：
- 找真正意想不到的关联点（不要套话）
- MVP 要具体到"今天的第一步做什么"
- 标题要有钩子，<20 字`;
    }
    case 'present_idea': {
      pushMessage({
        role: 'agent',
        kind: 'idea',
        idea: {
          title: input.title || '',
          description: input.description || '',
          connection: input.connection || '',
          mvp: input.mvp || ''
        },
        fromFragments: lastDicePick?.picked?.map((f) => f.text) || [],
        constraint: lastDicePick?.constraint || null
      });
      return 'idea 卡片已展示。再用一句话邀请用户收藏或再摇一次。';
    }
    case 'analyze_fragments': {
      if (state.fragments.length === 0) return '碎片库为空，提醒用户先攒一些。';
      return '当前碎片库（共 ' + state.fragments.length + ' 条）：\n'
        + state.fragments.map((f, i) => `${i + 1}. ${f.text}`).join('\n')
        + '\n\n请用 3-5 句话分析主题、共同点、隐藏兴趣方向，给用户启发性观察。';
    }
    case 'search_cases': {
      const query = (input.query || '').trim();
      if (!query) return '失败：搜索关键词为空。';
      try {
        const res = await fetch(API_BASE + '/web_search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + state.apiKey
          },
          body: JSON.stringify({
            search_engine: 'search-std',
            search_query: query,
            count: 5
          })
        });
        if (!res.ok) {
          const txt = await res.text();
          return '搜索失败 ' + res.status + '：' + txt.slice(0, 200);
        }
        const data = await res.json();
        const results = data.search_result || data.results || [];
        if (results.length === 0) return '没搜到相关结果。可以告诉用户：暂时没找到对应案例，说不定这正是这个 idea 的空间。';
        const formatted = results.slice(0, 5).map((r, i) => {
          const title = r.title || r.name || '(无标题)';
          const snippet = (r.content || r.snippet || r.description || '').slice(0, 200).replace(/\s+/g, ' ');
          const link = r.link || r.url || '';
          return `${i + 1}. ${title}\n   ${snippet}\n   ${link}`;
        }).join('\n\n');
        return `「${query}」的搜索结果：\n\n${formatted}\n\n请基于这些用 3-5 句话给用户介绍 1-3 个最相关案例（带链接），说明跟用户场景的相似/不同。`;
      } catch (err) {
        return '搜索失败：' + err.message;
      }
    }
    default:
      return '未知工具：' + name;
  }
}

async function callLLMWithTools(messages) {
  const payload = {
    model: MODEL,
    max_tokens: 1500,
    temperature: 0.8,
    messages: [{ role: 'system', content: buildSystemPrompt() }, ...messages],
    tools: TOOLS,

function safeParseArgs(raw) {
  if (!raw) return {};
  if (typeof raw === 'object') return raw;
  try { return JSON.parse(raw); } catch { return {}; }
}

async function runAgent(userText) {
  if (!ensureApiKey()) return;
  pushMessage({ role: 'user', kind: 'text', text: userText });
  const apiMessages = [{ role: 'user', content: userText }];
  let iter = 0;

  while (iter++ < MAX_AGENT_ITERATIONS) {
    setTypingMessage(true);
    let resp;
    try {
      resp = await callLLMWithTools(apiMessages);
    } catch (err) {
      setTypingMessage(false);
      pushMessage({ role: 'agent', kind: 'text', text: '出错了：' + err.message });
      return;
    }
    setTypingMessage(false);

    const choice = resp.choices && resp.choices[0];
    if (!choice || !choice.message) {
      pushMessage({ role: 'agent', kind: 'text', text: '模型没有返回内容。' });
      return;
    }
    const msg = choice.message;
    const text = (msg.content || '').trim();
    const toolCalls = msg.tool_calls || [];

    apiMessages.push({
      role: 'assistant',
      content: msg.content || '',
      ...(toolCalls.length ? { tool_calls: toolCalls } : {})
    });

    for (const tc of toolCalls) {
      const fname = tc.function?.name;
      if (fname && fname !== 'present_idea') {
        pushMessage({
          role: 'agent', kind: 'tool_call',
          tool: fname,
          input: safeParseArgs(tc.function?.arguments)
        });
      }
    }
    if (text) pushMessage({ role: 'agent', kind: 'text', text });

    const finish = choice.finish_reason;
    if (finish !== 'tool_calls' || toolCalls.length === 0) break;

    for (const tc of toolCalls) {
      const fname = tc.function?.name || '';
      const args = safeParseArgs(tc.function?.arguments);
      const result = await executeTool(fname, args);
      apiMessages.push({
        role: 'tool',
        tool_call_id: tc.id,
        content: typeof result === 'string' ? result : JSON.stringify(result)
      });
    }
  }
}

function handleUserInput(text) { return runAgent(text); }

function toast(msg, duration = 2800) {
  const t = el('div', { className: 'toast', text: msg });
  $('phone-frame').appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

function parseFragmentArray(text) {
  if (!text) return [];
  const candidates = [];
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) candidates.push(fence[1]);
  const bracket = text.match(/\[[\s\S]*\]/);
  if (bracket) candidates.push(bracket[0]);
  candidates.push(text);
  for (const c of candidates) {
    try {
      const arr = JSON.parse(c.trim());
      if (Array.isArray(arr)) {
        return arr.map((s) => String(s).trim()).filter(Boolean);
      }
    } catch {}
  }
  return [];
}

// ---------- Voice ----------
let recognition = null;
let isRecording = false;

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('语音输入需要 Chrome 浏览器'); return; }
  if (isRecording) { if (recognition) recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const ta = $('user-input');
    ta.value = (ta.value ? ta.value + ' ' : '') + text;
    ta.dispatchEvent(new Event('input'));
    ta.focus();
    pendingFragmentSource = '🎙️';
  };
  recognition.onend = () => {
    isRecording = false;
    $('btn-voice').classList.remove('recording');
  };
  recognition.onerror = (e) => {
    isRecording = false;
    $('btn-voice').classList.remove('recording');
    if (e.error && e.error !== 'aborted' && e.error !== 'no-speech') {
      toast('语音识别出错：' + e.error);
    }
  };
  try {
    recognition.start();
    isRecording = true;
    $('btn-voice').classList.add('recording');
  } catch (err) {
    toast('启动语音失败：' + err.message);
  }
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function extractFragmentsFromImage(base64) {
  const res = await fetch(API_BASE + '/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + state.apiKey
    },
    body: JSON.stringify({
      model: 'glm-4v-flash',
      max_tokens: 600,
      messages: [{
        role: 'user',
        content: [
          { type: 'text', text: '观察这张图片，从中提取 1-4 条灵感碎片，每条简洁一句话（关注趣味元素、场景氛围、文字信息、色彩或意图）。严格按 JSON 数组格式回复：["碎片1","碎片2"]，不要任何其他文字。' },
          { type: 'image_url', image_url: { url: base64 } }
        ]
      }]
    })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + '：' + txt.slice(0, 200));
  }
  const data = await res.json();
  const content = data.choices?.[0]?.message?.content || '';
  return parseFragmentArray(content);
}

async function handleImageFile(file) {

function setupDragDrop() {
  const pane = document.querySelector('.tab-pane[data-tab="chat"]');
  let dragCounter = 0;
  pane.addEventListener('dragenter', (e) => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types || []).includes('Files')) return;
    e.preventDefault();
    dragCounter++;
    pane.classList.add('dragging');
  });
  pane.addEventListener('dragover', (e) => {
    if (!e.dataTransfer || !Array.from(e.dataTransfer.types || []).includes('Files')) return;
    e.preventDefault();
  });
  pane.addEventListener('dragleave', () => {
    dragCounter = Math.max(0, dragCounter - 1);
    if (dragCounter === 0) pane.classList.remove('dragging');
  });
  pane.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    pane.classList.remove('dragging');
    const file = e.dataTransfer?.files?.[0];
    if (file) handleImageFile(file);
  });
}

}

function openSettings(mode) {
  $('api-key-input').value = state.apiKey;
  if (mode === 'first') {
    $('settings-title').textContent = '需要 AI 能力来帮你碰撞灵感 ✨';
    $('settings-desc').innerHTML =
      '请输入智谱 API Key。Key 只保存在你本地，不会上传任何地方。<br/>' +
      '<a href="https://open.bigmodel.cn/usercenter/apikeys" target="_blank">去 BigModel 申请</a>';
  } else {
    $('settings-title').textContent = '智谱 API Key';
    $('settings-desc').innerHTML =
      'Key 只保存在你本地 localStorage，不会上传任何地方。<br/>' +
      '<a href="https://open.bigmodel.cn/usercenter/apikeys" target="_blank">去 BigModel 申请</a>';
  }
  $('settings-modal').classList.add('show');
  setTimeout(() => $('api-key-input').focus(), 80);
}
function closeSettings() { $('settings-modal').classList.remove('show'); }

function refreshMeTab() {
  $('me-key-status').textContent = state.apiKey
    ? '已设置（' + state.apiKey.slice(0, 4) + '••••' + state.apiKey.slice(-4) + '）'
    : '未设置';
  $('me-fragment-count').textContent = state.fragments.length + ' 条';
  $('me-pocket-count').textContent = state.pocket.length + ' 条';
}

// ============================================================
// Init
// ============================================================
function init() {
  // Fragment add (sidebar)
  $('fragment-add-btn').onclick = () => {
    const v = $('fragment-input').value;
    if (addFragment(v, '')) $('fragment-input').value = '';
  };
  $('fragment-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('fragment-add-btn').click();
  });

  // Chat send
  const ta = $('user-input');
  const send = () => {
    const v = ta.value.trim();
    if (!v) return;
    ta.value = '';
    ta.style.height = 'auto';
    handleUserInput(v);
  };
  $('send-btn').onclick = send;
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });

  // Dice
  $('dice-btn').onclick = () => rollDice();

  // Media inputs
  $('btn-voice').onclick = toggleVoice;
  $('btn-image').onclick = pickImage;
  $('btn-import').onclick = openImport;
  $('btn-search').onclick = openSearchPrompt;
  $('image-file').addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    if (file) handleImageFile(file);
    e.target.value = '';
  });
  $('import-cancel').onclick = closeImport;
  $('import-line').onclick = importByLine;
  $('import-ai').onclick = importByAI;
  $('import-modal').onclick = (e) => {
    if (e.target.id === 'import-modal') closeImport();
  };
  setupDragDrop();

  // Settings (manual edit from me tab)
  $('settings-cancel').onclick = closeSettings;
  $('settings-save').onclick = () => {
    const v = $('api-key-input').value.trim();
    if (!v) { toast('Key 不能为空'); return; }
    state.apiKey = v;
    persist();
    closeSettings();
    refreshMeTab();
    toast('API Key 已保存 ✨');
  };
  $('settings-modal').onclick = (e) => {
    if (e.target.id === 'settings-modal') closeSettings();
  };

  // Clear chat
  $('btn-clear-chat').onclick = () => {
    if (!confirm('清空当前对话？（碎片库和灵感口袋不会被清空）')) return;
    state.chat = [];
    persist();
    renderChat();
  };

  // Bottom tabs
  document.querySelectorAll('.bottom-tab').forEach((btn) => {
    btn.onclick = () => switchTab(btn.dataset.tab);
  });

  // Me tab actions
  $('me-set-key').onclick = () => openSettings('edit');
  $('me-clear-all').onclick = () => {
    if (!confirm('清空所有数据？碎片库、灵感口袋、对话全部删除（API Key 保留）')) return;
    state.fragments = [];
    state.pocket = [];
    state.chat = [];
    persist();
    renderFragments();
    renderPocket();
    renderChat();
    refreshMeTab();
    toast('数据已清空');
  };

  // Initial render
  renderFragments();
  renderChat();
  renderPocket();
  refreshMeTab();

  // NOTE: do NOT auto-open settings on load.
  // API key prompt only fires when user triggers an AI action via ensureApiKey().
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
