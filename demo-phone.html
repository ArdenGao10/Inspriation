<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>灵感搜集器 · 手机 Demo</title>
<style>
  :root {
    color-scheme: light;
    --bg: #e8eef7;
    --phone: #171717;
    --rim: rgba(255,255,255,.72);
    --shadow: rgba(24, 30, 42, .24);
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  body {
    display: grid;
    place-items: center;
    min-height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 25% 18%, rgba(255,255,255,.92), transparent 28%),
      linear-gradient(135deg, #f3f6fb 0%, var(--bg) 52%, #dfe7f2 100%);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  }

  .stage {
    display: grid;
    place-items: center;
    width: 100vw;
    height: 100vh;
    padding: 26px;
  }

  .phone {
    position: relative;
    width: min(390px, calc(100vw - 36px));
    aspect-ratio: 390 / 844;
    padding: 12px;
    border-radius: 44px;
    background:
      linear-gradient(145deg, rgba(255,255,255,.18), transparent 24%),
      var(--phone);
    box-shadow:
      0 28px 80px var(--shadow),
      inset 0 0 0 1px rgba(255,255,255,.22),
      inset 0 0 0 3px rgba(0,0,0,.7);
  }

  .phone::before {
    content: "";
    position: absolute;
    z-index: 2;
    top: 17px;
    left: 50%;
    width: 112px;
    height: 28px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: #0d0d0d;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    pointer-events: none;
  }

  .phone::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 40px;
    border: 1px solid var(--rim);
    pointer-events: none;
  }

  .screen {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border: 0;
    border-radius: 34px;
    background: #fbfaf5;
  }

  @media (max-height: 900px) {
    .phone {
      width: min(360px, calc(100vw - 36px));
    }
  }

  @media (max-height: 780px) {
    .phone {
      width: min(320px, calc(100vw - 30px));
    }
  }
</style>
</head>
<body>
  <main class="stage" aria-label="灵感搜集器手机演示">
    <section class="phone" aria-label="手机外框">
      <iframe class="screen" title="灵感搜集器" src="/"></iframe>
    </section>
  </main>
</body>
</html>
